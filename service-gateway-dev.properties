eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.routes[0].id=service-staff
spring.cloud.gateway.routes[0].uri=lb://SERVICE-STAFF
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/staff/**,/api/leave/**

spring.cloud.gateway.routes[1].id=service-patient
spring.cloud.gateway.routes[1].uri=lb://SERVICE-PATIENT
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/patient/**

spring.cloud.gateway.routes[2].id=service-appointment
spring.cloud.gateway.routes[2].uri=lb://SERVICE-APPOINTMENT
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/appointment/**

spring.cloud.gateway.routes[3].id=service-notification
spring.cloud.gateway.routes[3].uri=lb://SERVICE-NOTIFICATION
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/notification/email/**

springdoc.swagger-ui.urls[0].name=SERVICE-STAFF
springdoc.swagger-ui.urls[0].url=/service-staff/v3/api-docs

springdoc.swagger-ui.urls[1].name=SERVICE-PATIENT
springdoc.swagger-ui.urls[1].url=/service-patient/v3/api-docs

springdoc.swagger-ui.urls[2].name=SERVICE-APPOINTMENT
springdoc.swagger-ui.urls[2].url=/service-appointment/v3/api-docs

springdoc.swagger-ui.urls[2].name=SERVICE-NOTIFICATION
springdoc.swagger-ui.urls[2].url=/service-notification/v3/api-docs